<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delta Tamizhan Fx | Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <button class="menu-btn" id="menu-open">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div class="brand-name">Delta Tamizhan Fx</div>
            </div>
            <div class="nav-right">
                <div class="cart-trigger" id="cart-open">
                    <span class="cart-label">Cart</span>
                    <span id="cart-count">0</span>
                </div>
            </div>
        </div>
    </nav>

    <div id="nav-drawer" class="drawer left">
        <div class="drawer-header">
            <h3>Account</h3>
            <button class="close-btn" id="menu-close">&times;</button>
        </div>
        <div class="drawer-body">
            <div id="auth-section">
                <p class="input-hint">Login to access your premium assets</p>
                <input type="email" id="login-email" placeholder="Email Address" class="styled-input">
                <input type="password" id="login-password" placeholder="Password" class="styled-input">
                <button class="action-btn login-primary" id="login-trigger">Login</button>
                <button class="action-btn signup-secondary" id="signup-trigger">Create Account</button>
            </div>
            
            <div id="user-profile" style="display:none; flex-direction: column;">
                <div class="profile-content">
                    <p id="display-user-email" class="user-email-text"></p>
                    <div class="menu-item" id="my-purchases-btn">My Purchases</div>
                </div>
                <button class="action-btn logout-btn" id="logout-trigger">Logout Account</button>
            </div>

            <div id="purchases-view" style="display:none;">
                <button id="back-to-profile" style="background:none; border:none; color:var(--primary); cursor:pointer; font-weight:600; margin-bottom:20px; font-family:inherit;">← Back</button>
                <h4 style="margin-bottom:15px; text-transform:uppercase; font-size:0.8rem; letter-spacing:1px;">My Assets</h4>
                <div id="purchased-list-container"></div>
            </div>
        </div>
    </div>

    <div id="cart-drawer" class="drawer right">
        <div class="drawer-header">
            <h3>Your Cart</h3>
            <button class="close-btn" id="cart-close">&times;</button>
        </div>
        <div id="cart-items-list" class="drawer-body"></div>
        <div class="drawer-footer">
            <div class="total-row" style="display:flex; justify-content:space-between; margin-bottom:15px; font-weight:700;">
                <span>Total</span>
                <span id="cart-total"><span class="r-sym">₹</span>0</span>
            </div>
            <button class="action-btn checkout-btn login-primary" id="checkout-trigger">Proceed to Payment</button>
        </div>
    </div>

    <div id="success-popup" class="overlay" style="display:none; align-items:center; justify-content:center; z-index:3000;">
        <div style="background:var(--surface); padding:40px; border-radius:24px; text-align:center; border:1px solid var(--primary); width:80%; max-width:400px;">
            <div style="font-size:3rem; margin-bottom:10px;">✅</div>
            <h2 style="color:var(--primary); margin-bottom:10px;">Success!</h2>
            <p style="color:var(--text-dim); margin-bottom:20px;">Task completed successfully.</p>
            <button class="action-btn login-primary" id="close-popup">Continue</button>
        </div>
    </div>

    <div id="ui-overlay" class="overlay"></div>

    <main class="container">
        <header class="hero"><h1>Premium Assets</h1></header>
        <div class="product-grid" id="product-list"></div>
    </main>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
